services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: media_ax
      POSTGRES_USER: media_ax
      POSTGRES_PASSWORD: media_ax
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  elasticsearch:
    image: elasticsearch:8.14.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  backend:
    build: ./backend
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Seoul
    # bind mount가 WSL2에서 분리되면 /app이 비어 앱이 죽지만 컨테이너는 "Up"으로 남는다.
    # healthcheck로 실제 앱 생존을 검사해 "unhealthy"로 즉시 가시화한다.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
      - redis
      - ollama

  worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A workers.celery_app worker --loglevel=info -Q design.high,design.normal,design.brand_check,design.cdn,ingest,analytics,metadata
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=/app
      - TZ=Asia/Seoul
    depends_on:
      - postgres
      - redis

  beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=/app
      - TZ=Asia/Seoul
    depends_on:
      - redis
      - worker

  frontend:
    build:
      context: ./mediaX-CMS
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    volumes:
      - ./mediaX-CMS:/app
      - /app/node_modules
      - /app/apps/web/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_ENABLE_PIPELINE_TEST=true
    depends_on:
      - backend

volumes:
  postgres_data:
  es_data:
  ollama_data:
