services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: media_ax
      POSTGRES_USER: media_ax
      POSTGRES_PASSWORD: media_ax
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  elasticsearch:
    image: elasticsearch:8.14.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  backend:
    build: ./backend
    restart: unless-stopped
    # 컨테이너 기동 시 DB 마이그레이션을 먼저 적용(멱등) — 모델-DB 스키마 괴리로 인한
    # "column does not exist" 재발 차단. 이미 head면 no-op.
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Seoul
    # bind mount가 WSL2에서 분리되면 /app이 비어 앱이 죽지만 컨테이너는 "Up"으로 남는다.
    # healthcheck로 실제 앱 생존을 검사해 "unhealthy"로 즉시 가시화한다.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
      - redis
      - ollama

  worker:
    build: ./backend
    restart: unless-stopped
    # dev: watchmedo auto-restart로 코드 변경 시 worker 자동 재기동(uvicorn --reload의 worker판).
    # Celery는 핫리로드가 없어, 미적용 시 bind mount로 파일이 바뀌어도 옛 코드가 task를 처리한다.
    command: watchmedo auto-restart --directory=/app --pattern=*.py --recursive --ignore-patterns=*/.* -- celery -A workers.celery_app worker --loglevel=info -Q design.high,design.normal,design.brand_check,design.cdn,ingest,analytics,metadata,pipeline_fast
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=/app
      - TZ=Asia/Seoul
    # backend가 마이그레이션을 끝내고 healthy가 된 뒤에 기동 — worker가 옛 스키마로
    # 쿼리하는 타이밍 race 제거.
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      backend:
        condition: service_healthy

  worker-ai:
    build: ./backend
    restart: unless-stopped
    # ADR-010 + facet: AI 단계 + MediSearch facet 평가 공용 워커 — concurrency 2
    # facet 큐 볼륨 증가 시 전용 worker-facet 컨테이너 분리 가능 (compose 블록 1개 추가).
    # dev: watchmedo auto-restart로 코드 변경 시 자동 재기동 (worker와 동일 정책).
    command: watchmedo auto-restart --directory=/app --pattern=*.py --recursive --ignore-patterns=*/.* -- celery -A workers.celery_app worker --loglevel=info -Q pipeline_ai,facet --concurrency=2
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=/app
      - TZ=Asia/Seoul
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      backend:
        condition: service_healthy

  beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=/app
      - TZ=Asia/Seoul
    depends_on:
      - redis
      - worker

  frontend:
    build:
      context: ./mediaX-CMS
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    volumes:
      - ./mediaX-CMS:/app
      - /app/node_modules
      - /app/apps/web/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_ENABLE_PIPELINE_TEST=true
    depends_on:
      - backend

volumes:
  postgres_data:
  es_data:
  ollama_data:
